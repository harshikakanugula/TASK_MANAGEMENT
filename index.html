<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Modern Task Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="app-container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">✓</div>
                    <span class="logo-text">TaskFlow</span>
                </div>
                <div class="header-right">
                    <div class="datetime">
                        <span class="current-time" id="currentTime">00:00:00</span>
                        <span class="current-date" id="currentDate">Loading...</span>
                    </div>
                    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="app-container">
            <!-- Dashboard Stats -->
            <div class="stats-grid">
                <div class="stat-card total">
                    <div class="stat-icon">📋</div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalTasks">0</div>
                        <div class="stat-label">Total Tasks</div>
                    </div>
                </div>
                <div class="stat-card completed">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <div class="stat-value" id="completedTasks">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-content">
                        <div class="stat-value" id="pendingTasks">0</div>
                        <div class="stat-label">Pending</div>
                    </div>
                </div>
                <div class="stat-card high">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-content">
                        <div class="stat-value" id="highPriorityTasks">0</div>
                        <div class="stat-label">High Priority</div>
                    </div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-section">
                <div class="progress-header">
                    <span class="progress-title">Overall Progress</span>
                    <span class="progress-percentage" id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <!-- Controls Section -->
            <div class="controls-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search tasks...">
                </div>
                <div class="filter-group">
                    <select class="filter-select" id="priorityFilter">
                        <option value="">All Priorities</option>
                        <option value="high">High Priority</option>
                        <option value="medium">Medium Priority</option>
                        <option value="low">Low Priority</option>
                    </select>
                    <select class="filter-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option value="pending">Pending</option>
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <button class="btn btn-primary" id="addTaskBtn">
                    <span>➕</span>
                    <span>Add Task</span>
                </button>
            </div>

            <!-- Tasks Section -->
            <div class="tasks-section">
                <div class="tasks-header">
                    <h2 class="tasks-title">My Tasks</h2>
                    <span class="tasks-count" id="tasksCount">0 tasks</span>
                </div>
                <div class="tasks-grid" id="tasksGrid">
                    <!-- Tasks will be rendered here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Add/Edit Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add New Task</h3>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="taskForm">
                    <input type="hidden" id="taskId">
                    <div class="form-group">
                        <label class="form-label" for="taskTitle">Task Title *</label>
                        <input type="text" class="form-input" id="taskTitle" placeholder="Enter task title" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="taskDescription">Description</label>
                        <textarea class="form-textarea" id="taskDescription"
                            placeholder="Enter task description"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="taskDueDate">Due Date</label>
                            <input type="date" class="form-input" id="taskDueDate">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="taskPriority">Priority</label>
                            <select class="form-select" id="taskPriority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="taskStatus">Status</label>
                        <select class="form-select" id="taskStatus">
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelTask">Cancel</button>
                <button class="btn btn-primary" id="saveTask">Save Task</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay confirm-modal" id="confirmModal">
        <div class="modal">
            <div class="modal-body" style="padding: 2rem;">
                <div class="confirm-icon">🗑️</div>
                <h3 class="confirm-title">Delete Task?</h3>
                <p class="confirm-message">This action cannot be undone. The task will be permanently removed.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>

</html>
